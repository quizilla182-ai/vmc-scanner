name: VMC Scanner
on:
  schedule:
    - cron: '0 1 * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests pandas numpy schedule
      - run: python vmc_scanner.py

